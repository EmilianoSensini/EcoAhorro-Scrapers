name: ETL Pipeline

on:
  schedule:
    # Run daily at 02:00 Argentina time (UTC-3)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: true
        default: 'upload-only'
        type: choice
        options:
          - full
          - upload-only

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browsers
        if: ${{ github.event.inputs.mode == 'full' || github.event_name == 'schedule' }}
        run: |
          python -m playwright install chromium

      - name: Run ETL pipeline
        if: ${{ github.event.inputs.mode == 'full' || github.event_name == 'schedule' }}
        run: python -m etl.run

      - name: Upload test CSV to DB
        if: ${{ github.event.inputs.mode == 'upload-only' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.step_upload data/test_upload.csv

      - name: Upload price data as artifact
        if: ${{ github.event.inputs.mode == 'full' || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v4
        with:
          name: price-data
          path: |
            data/consolidado_precios.csv
            data/tabla_maestra.csv
            logs/etl.log
