name: Price History Aggregator

on:
  schedule:
    # Run every Monday at 14:00 Argentina time (UTC-3) = 17:00 UTC
    - cron: '0 17 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run price history aggregator
        working-directory: tasks/price-history-aggregator
        run: python -m src

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-history-aggregator-logs
          path: tasks/price-history-aggregator/logs/aggregate.log
